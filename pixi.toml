[workspace]
authors = ["Anders Kaestner <anders.kaestner@psi.ch>"]
channels = ["conda-forge"]
name = "EvalFramework env"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
build-wheel = "python -m build --wheel"
test = "pytest src/tests"
docs = "mkdocs serve"
docs-build = "mkdocs build"

[dependencies]
python = ">=3.14.2,<3.15"
numpy = ">=2.3.5,<3"
scipy = ">=1.16.3,<2"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.0,<0.14"
jupyter = "*"
notebook = "7.*"
pandas = ">=2.3.3,<3"
scikit-learn = ">=1.8.0,<2"
scikit-image = ">=0.25.2,<0.26"
uncertainties = ">=3.2.3,<4"
astropy = ">=7.2.0,<8"
tifffile = ">=2025.12.12,<2026"
tqdm = ">=4.67.1,<5"
pytest = "*"

[pypi-dependencies]
hatchling = "*"
build = "*"
mkdocs = ">=1.6"
mkdocs-material = ">=9.5"

